<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lilac — Receipt demo (URL-fragment 永続化)</title>
    <style>
      :root {
        --bg: #fafafa; --panel: #fff; --border: #e5e5e5;
        --accent: #b94f3f; --muted: #888; --text: #222;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 760px; margin: 0 auto; padding: 2em 1em;
        line-height: 1.55; color: var(--text); background: var(--bg);
      }
      h1 { margin: 0 0 0.3em 0; }
      .lede { color: var(--muted); margin-top: 0; }
      table.receipt {
        width: 100%; border-collapse: collapse; margin: 1em 0;
        background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
        overflow: hidden;
      }
      table.receipt th, table.receipt td {
        padding: 0.5em 0.7em; border-bottom: 1px solid var(--border); text-align: left;
      }
      table.receipt thead th { background: #f5f5f5; font-weight: 600; font-size: 0.9em; }
      table.receipt tfoot td { background: #f7f7f7; border-bottom: none; }
      table.receipt tfoot tr:last-child td { font-weight: 600; }
      table.receipt td.num, table.receipt th.num { text-align: right; font-variant-numeric: tabular-nums; }
      table.receipt input[type="text"], table.receipt input[type="number"] {
        width: 100%; padding: 0.3em 0.4em; font-size: inherit; font-family: inherit;
        border: 1px solid transparent; background: transparent; border-radius: 4px;
      }
      table.receipt input[type="number"] { text-align: right; font-variant-numeric: tabular-nums; }
      table.receipt input:focus { outline: none; border-color: var(--accent); background: white; }
      .dismiss {
        background: transparent; border: 1px solid transparent;
        color: var(--muted); font-size: 1.1em; line-height: 1;
        padding: 0.1em 0.4em; cursor: pointer;
      }
      .dismiss:hover { color: var(--accent); border-color: var(--border); }
      .add-button {
        font-size: 0.95em; padding: 0.4em 0.9em; border-radius: 6px;
        border: 1px solid var(--accent); background: var(--accent); color: white;
        cursor: pointer;
      }
      .add-button:hover { opacity: 0.88; }
      #boot { color: var(--muted); font-size: 0.85em; margin-top: 2em; }
    </style>
  </head>
  <body>
    <h1>Lilac — receipt demo</h1>
    <p class="lede">
      An editable receipt with line items, totals, and shareable state in the URL.
    </p>

    <div data-component="Receipt">
      <table class="receipt">
        <thead>
          <tr>
            <th>品目</th>
            <th class="num" style="width: 5em;">数量</th>
            <th class="num" style="width: 7em;">単価</th>
            <th class="num" style="width: 8em;">小計</th>
            <th style="width: 2.5em;"></th>
          </tr>
        </thead>
        <tbody data-each="@items" data-key="id">
          <tr data-component="LineRow">
            <td><input data-bind="@description" type="text" placeholder="品目"></td>
            <td class="num"><input data-bind="@qty" type="number" min="0" inputmode="numeric"></td>
            <td class="num"><input data-bind="@unit_price" type="number" min="0" inputmode="numeric"></td>
            <td class="num" data-text="@line_total"></td>
            <td><button class="dismiss" data-on-click="remove" type="button" aria-label="delete">×</button></td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3">小計</td>
            <td class="num" data-text="@subtotal_text"></td>
            <td></td>
          </tr>
          <tr>
            <td colspan="3">消費税 (10%)</td>
            <td class="num" data-text="@tax_text"></td>
            <td></td>
          </tr>
          <tr>
            <td colspan="3">合計</td>
            <td class="num" data-text="@total_text"></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <button data-on-click="add_row" class="add-button" type="button">+ 行を追加</button>
    </div>

    <p id="boot">booting…</p>

    <script type="text/ruby" id="receipt-source">
class Receipt < Lilac::Component
  HASH_PREFIX = "#state="

  # Yen 整形は LineRow 側からも呼ぶので class method として共有。
  def self.format_yen(n)
    s = n.to_i.abs.to_s
    groups = []
    i = s.length
    while i > 3
      groups.unshift(s[i - 3, 3])
      i -= 3
    end
    groups.unshift(s[0, i]) if i > 0
    sign = n < 0 ? "-" : ""
    "#{sign}¥#{groups.join(",")}"
  end

  def prepare_setup
    @items = signal(load_from_url || default_items)
    @next_id = signal((@items.value.map { |it| it["id"] }.max || 0) + 1)
    # 子 LineRow が lookup(:items) で同じ Signal を引く。
    expose :items, @items
  end

  def setup
    @subtotal = computed do
      @items.value.sum { |it| it["qty"].to_i * it["unit_price"].to_i }
    end
    @tax   = computed { (@subtotal.value * 0.1).round }
    @total = computed { @subtotal.value + @tax.value }

    # 表示用の整形済み Computed。HTML 側の data-text="@X_text" が参照する。
    @subtotal_text = computed { Receipt.format_yen(@subtotal.value) }
    @tax_text      = computed { Receipt.format_yen(@tax.value) }
    @total_text    = computed { Receipt.format_yen(@total.value) }

    # @items → URL の片方向 sync。replaceState 経由で history を汚さない。
    effect(label: "url-sync") do
      encoded = JS.encode_uri_component(Lilac::JSON.generate(@items.value))
      JS.global[:history].call(:replaceState,
                               JS.global[:history][:state], "",
                               "#{HASH_PREFIX}#{encoded}")
    end
  end

  def add_row(_event)
    id = @next_id.value
    @next_id.update { |n| n + 1 }
    @items.update do |arr|
      arr + [{ "id" => id, "description" => "", "qty" => "1", "unit_price" => "0" }]
    end
  end

  private

  # Tolerant load: 空 / 別形式 / 壊れた JSON はすべて nil 返しで
  # default_items にフォールバック。
  def load_from_url
    hash = JS.global[:location][:hash].to_s
    return nil if hash.empty? || !hash.start_with?(HASH_PREFIX)
    encoded = hash[HASH_PREFIX.length..-1]
    json = JS.decode_uri_component(encoded)
    parsed = Lilac::JSON.parse(json)
    return nil unless parsed.is_a?(Array)
    parsed.map do |h|
      { "id" => h["id"].to_i,
        "description" => h["description"].to_s,
        "qty" => h["qty"].to_s,
        "unit_price" => h["unit_price"].to_s }
    end
  rescue JS::Error
    nil
  end

  def default_items
    [
      { "id" => 1, "description" => "コーヒー",       "qty" => "2", "unit_price" => "450" },
      { "id" => 2, "description" => "チーズケーキ", "qty" => "1", "unit_price" => "680" },
    ]
  end
end

# 1 行 = 1 コンポーネント。data-each 配下の data-component は prop 宣言
# から item の同名 field が auto-fill される(`data-prop-X` 明示は不要)。
# input は HTML 側の data-bind="@X" で各 prop signal に declarative に
# 双方向結線、変更を effect で親の @items に書き戻す。書き戻しで
# data-each が reconcile しても auto-fill push が同じ値を書くだけなので
# Signal#value= が primitive 等値で no-op → ループしない。
class LineRow < Lilac::Component
  prop :id, Integer
  prop :description, String
  prop :qty, String
  prop :unit_price, String

  def setup
    @items = lookup(:items)

    @line_total = computed {
      Receipt.format_yen(@qty.value.to_i * @unit_price.value.to_i)
    }

    effect(label: "row-mirror") do
      desc = @description.value
      q    = @qty.value
      up   = @unit_price.value
      @items.update do |arr|
        arr.map do |it|
          it["id"] == id ?
            it.merge("description" => desc, "qty" => q, "unit_price" => up) :
            it
        end
      end
    end
  end

  def remove(_event)
    @items.update { |arr| arr.reject { |x| x["id"] == id } }
  end
end

Lilac.register "Receipt", Receipt
Lilac.register "LineRow", LineRow
Lilac.start
puts "receipt demo mounted"
    </script>

    <script type="module">
      import { createVM } from "../../mrbgem/mruby-wasm-js/js/index.js";
      const boot = document.getElementById("boot");
      try {
        const vm = await createVM({ wasm: "../../build/lilac-full.wasm" });
        vm.evalScript("#receipt-source");
        boot.textContent = "ready — qty / unit_price を編集して URL bar の #state を確認、別タブにコピペで復元";
      } catch (err) {
        console.error(err);
        boot.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
