<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lilac plug-in demo — data-tooltip / data-autofocus</title>
</head>
<body>
  <h1>Lilac plug-in demo</h1>
  <p>
    Built with <code>lilac build --target compiled</code>. The
    <code>data-tooltip</code> / <code>data-autofocus</code> directives
    come from <code>@takahashim/lilac-plugin-extras</code>, loaded at
    boot time via <code>c.plugins</code> in <code>lilac.config.rb</code>.
  </p>
  <lilac-component name="tooltip-demo"></lilac-component>
</body>
</html>
