<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grainet — Pseudo-3D racer demo</title>
    <style>
      :root {
        --bg: #fafafa; --panel: #fff; --border: #e5e5e5;
        --accent: #b94f3f; --muted: #888; --text: #222;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 720px; margin: 0 auto; padding: 2em 1em;
        line-height: 1.55; color: var(--text); background: var(--bg);
      }
      h1 { margin: 0 0 0.3em 0; }
      .lede { color: var(--muted); margin-top: 0; }
      .hud {
        font: 600 1em ui-monospace, monospace;
        display: flex; gap: 1.5em; align-items: baseline;
        margin: 1em 0 0.4em 0;
      }
      .hud .hint { color: var(--muted); font-weight: 400; font-size: 0.85em; }
      .stats {
        display: flex; gap: 1.2em;
        font: 0.8em ui-monospace, monospace;
        color: var(--muted);
        margin: 0.4em 0;
      }
      .stats span b { color: var(--text); font-weight: 600; }
      .stats b.gc     { color: var(--accent); }
      .stats b.growth { color: #2a7a4e; }
      canvas {
        display: block;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #87CEEB;  /* fallback sky color before first render */
        cursor: crosshair;
      }
      #boot { color: var(--muted); font-size: 0.85em; margin-top: 1em; }
    </style>
  </head>
  <body>
    <h1>Grainet — Pseudo-3D racer demo</h1>
    <p class="lede">
      A pseudo-3D driving demo with keyboard steering, speed, and distance.
    </p>

    <div data-widget="racer">
      <div class="hud">
        <span>Speed: <b data-ref="speed">0 km/h</b></span>
        <span>Dist: <b data-ref="distance">0 m</b></span>
        <span class="hint">← →: steer&nbsp;&nbsp;↑: accel&nbsp;&nbsp;↓: brake&nbsp;&nbsp;(no input → cruise)</span>
      </div>
      <div class="stats">
        <span>FPS: <b data-ref="fps">--</b></span>
        <span>WASM mem: <b data-ref="wasm_mem">--</b></span>
        <span>JS handles: <b data-ref="js_handles">--</b></span>
        <span>Ruby cb: <b data-ref="rb_callbacks">--</b></span>
        <span>Ruby obj: <b data-ref="rb_objects">--</b></span>
        <span>Δ: <b data-ref="rb_obj_delta">--</b></span>
      </div>
      <canvas data-ref="canvas" width="640" height="360"></canvas>
    </div>

    <p id="boot">booting…</p>

    <script type="text/ruby" id="ruby-source">
class Racer < Grainet::Widget
  WIDTH         = 640
  HEIGHT        = 360
  ROAD_WIDTH    = 2000
  SEGMENT_LEN   = 200
  RUMBLE_LEN    = 2
  DRAW_DIST     = 120
  CAM_DEPTH     = 0.84
  CAM_HEIGHT    = 700        # lowered — road feels close / motion feels strong
  PLAYER_Z      = -CAM_HEIGHT * CAM_DEPTH
  MAX_SPEED     = 60.0       # internal cap; HUD ~360 km/h flat-out
  CRUISE_SPEED  = 28.0
  ACCEL         = 1.0
  BRAKE         = 0.6
  CRUISE_PULL   = 0.15
  STEER         = 0.04
  INITIAL_SPEED = 28.0
  # World scrolls this many times faster than the internal speed so
  # the cruise feel matches what the HUD reports as "max speed" used to
  # look like. HUD numbers (km/h, m/km) are unaffected.
  WORLD_SCROLL  = 2.0

  COLORS = {
    sky:           "#87CEEB",
    sky_far:       "#a6d8f0",
    grass_light:   "#76b853",
    grass_dark:    "#5da43e",
    rumble_light:  "#ffffff",
    rumble_dark:   "#cc2222",
    road_light:    "#666666",
    road_dark:     "#5a5a5a",
    lane:          "#ffffff",
    tree_trunk:    "#5a3a1a",
    tree_leaves:   "#2d6f2d",
    sign_pole:     "#888",
    sign_face:     "#ffd166",
    car_body:      "#b94f3f",
    car_wheel:     "#222",
    car_window:    "#ddeeff",
  }.freeze

  def setup
    @position = signal(0.0)
    @speed    = signal(INITIAL_SPEED)
    @player_x = signal(0.0)
    @input    = { left: false, right: false, accel: false, brake: false }
    @speed_lines_phase = 0.0

    # Diagnostic stats sampled every ~500ms.
    @fps          = signal(0)
    @wasm_mem     = signal(0)
    @js_handles   = signal(0)
    @rb_callbacks = signal(0)
    @rb_objects   = signal(0)   # live mruby objects
    @rb_obj_delta = signal(0)   # change since last sample (negative = GC ran)
    @prev_objects = 0
    @frames_since_stats = 0
    @stats_window_start = 0.0

    @segments     = build_track
    @track_length = @segments.length * SEGMENT_LEN
    @sprites      = build_sprites
    @ctx          = refs.canvas.to_js.call(:getContext, "2d")
    # Headless smoke runners (happy-dom) don't implement Canvas 2D.
    # Skip rendering in that case; physics still tick.
    @has_canvas = !@ctx.js_null?

    wire_hud
    wire_input
    each_frame do |ts|
      sample_stats(ts)
      update_physics
      render if @has_canvas
    end
  end

  def sample_stats(ts)
    @frames_since_stats += 1
    if @stats_window_start == 0.0
      @stats_window_start = ts.to_f
      return
    end
    elapsed = ts.to_f - @stats_window_start
    return if elapsed < 500.0

    @fps.value = (@frames_since_stats * 1000.0 / elapsed).round
    @frames_since_stats = 0
    @stats_window_start = ts.to_f

    vm = JS.global[:__racer_vm]
    return if vm.js_null?
    @wasm_mem.value     = vm[:instance][:exports][:memory][:buffer][:byteLength].to_i
    @js_handles.value   = vm.call(:handleCount).to_i
    @rb_callbacks.value = JS.stats[:callbacks].to_i

    # Force a full GC sweep before sampling. Without this, mruby's
    # incremental GC spreads work across frames and `count_objects`
    # rarely catches a drop — we'd see steady monotonic growth even
    # though no leak exists. With explicit GC.start, Δ between samples
    # represents "objects that survived collection" — leak indicator.
    GC.start
    counts = ObjectSpace.count_objects
    live = counts[:TOTAL].to_i - counts[:FREE].to_i
    @rb_obj_delta.value = live - @prev_objects
    @rb_objects.value = live
    @prev_objects = live
  end

  def format_bytes(bytes)
    return "--" if bytes == 0
    if bytes >= 1024 * 1024
      sprintf("%.2f MB", bytes / 1048576.0)
    else
      sprintf("%.1f KB", bytes / 1024.0)
    end
  end

  private

  # ---- HUD ---------------------------------------------------------

  def wire_hud
    bind refs.speed, text: computed {
      "#{(@speed.value * 6).to_i} km/h"
    }
    bind refs.distance, text: computed {
      m = (@position.value / 10).to_i
      m >= 1000 ? sprintf("%.2f km", m / 1000.0) : "#{m} m"
    }
    bind refs.fps,           text: computed { @fps.value.to_s }
    bind refs.wasm_mem,      text: computed { format_bytes(@wasm_mem.value) }
    bind refs.js_handles,    text: computed { @js_handles.value.to_s }
    bind refs.rb_callbacks,  text: computed { @rb_callbacks.value.to_s }
    bind refs.rb_objects,    text: computed { @rb_objects.value.to_s }
    bind refs.rb_obj_delta,  text: computed {
      d = @rb_obj_delta.value
      d > 0 ? "+#{d}" : d.to_s
    }
    # Highlight negative delta (= GC swept) by painting it in the
    # accent colour via class binding.
    bind refs.rb_obj_delta, class: {
      "gc"     => computed { @rb_obj_delta.value < 0 },
      "growth" => computed { @rb_obj_delta.value > 0 },
    }
  end

  # ---- Input -------------------------------------------------------

  def wire_input
    doc = wrap(JS.global[:document])
    doc.on(:keydown) { |event| update_key(event[:key].to_s, true) }
    doc.on(:keyup)   { |event| update_key(event[:key].to_s, false) }
  end

  def update_key(key, down)
    case key
    when "ArrowLeft"  then @input[:left]  = down
    when "ArrowRight" then @input[:right] = down
    when "ArrowUp"    then @input[:accel] = down
    when "ArrowDown"  then @input[:brake] = down
    end
  end

  # ---- Physics -----------------------------------------------------

  def update_physics
    if @input[:accel]
      @speed.value = [@speed.value + ACCEL, MAX_SPEED].min
    elsif @input[:brake]
      @speed.value = [@speed.value - BRAKE, 0.0].max
    else
      # No input: ease back toward cruise speed (don't grind to a halt).
      diff = CRUISE_SPEED - @speed.value
      step = diff.abs < CRUISE_PULL ? diff : (diff > 0 ? CRUISE_PULL : -CRUISE_PULL)
      @speed.value += step
    end

    @position.value = (@position.value + @speed.value * WORLD_SCROLL) % @track_length

    # Manual steering only — no centrifugal drift, no auto-recenter.
    # The player sits where they aim until they aim somewhere else.
    speed_norm = @speed.value / MAX_SPEED
    @player_x.value -= STEER * speed_norm if @input[:left]
    @player_x.value += STEER * speed_norm if @input[:right]

    # Off-road: clamp lateral, decelerate as if on grass.
    # The `.min` caps top speed (you can't go faster than grass-max),
    # the `.max` keeps the result non-negative — without it, brake +
    # grass could push speed below zero and drive the car backwards.
    if @player_x.value.abs > 1.0
      grass_capped = [@speed.value - 0.6, MAX_SPEED * 0.4].min
      @speed.value = [grass_capped, 0.0].max
      @player_x.value = clamp(@player_x.value, -1.5, 1.5)
    end
  end

  # ---- Track generation -------------------------------------------

  def build_track
    segs = []
    add_road(segs, length: 30,  curve: 0.0,  hill: 0.0)
    add_road(segs, length: 50,  curve: 4.0,  hill: 0.0)     # right
    add_road(segs, length: 30,  curve: 0.0,  hill: 50.0)    # uphill straight
    add_road(segs, length: 60,  curve: -5.0, hill: -20.0)   # hard left + down
    add_road(segs, length: 40,  curve: 0.0,  hill: 0.0)
    add_road(segs, length: 50,  curve: 6.0,  hill: 30.0)    # tight right + up
    add_road(segs, length: 50,  curve: -4.5, hill: -60.0)   # left + drop
    add_road(segs, length: 30,  curve: 2.0,  hill: 0.0)
    add_road(segs, length: 40,  curve: -3.0, hill: 0.0)
    add_road(segs, length: 40,  curve: 0.0,  hill: 0.0)
    segs
  end

  def add_road(segs, length:, curve:, hill:)
    start_y = segs.empty? ? 0.0 : segs.last["p2"]["y"]
    end_y   = start_y + hill
    length.times do |n|
      i = segs.length
      pct_prev = n.to_f / length
      pct_next = (n + 1).to_f / length
      y_prev = start_y + ease_in_out(pct_prev) * (end_y - start_y)
      y_next = start_y + ease_in_out(pct_next) * (end_y - start_y)
      segs << {
        "index" => i,
        "p1" => { "z" => i.to_f * SEGMENT_LEN, "y" => y_prev,
                  "sx" => 0, "sy" => 0, "sw" => 0, "scale" => 0.0 },
        "p2" => { "z" => (i + 1).to_f * SEGMENT_LEN, "y" => y_next,
                  "sx" => 0, "sy" => 0, "sw" => 0, "scale" => 0.0 },
        "curve" => curve,
        "color" => (i / RUMBLE_LEN).to_i.even? ? :light : :dark,
      }
    end
  end

  def ease_in_out(p)
    (1.0 - Math.cos(p * Math::PI)) / 2.0
  end

  def find_segment(z)
    @segments[((z / SEGMENT_LEN).to_i % @segments.length)]
  end

  # ---- Sprites -----------------------------------------------------

  def build_sprites
    list = []
    rng = Random.new(42)
    @segments.length.times do |i|
      next if i % 3 != 0          # denser roadside → stronger sense of motion
      next if rng.rand < 0.25
      side = rng.rand < 0.5 ? -1.0 : 1.0
      offset = 1.1 + rng.rand * 0.4   # just outside the kerb, stays on canvas
      list << {
        "z"    => i * SEGMENT_LEN,
        "x"    => side * offset,
        "kind" => rng.rand < 0.7 ? :tree : :sign,
      }
    end
    list
  end

  # ---- Rendering ---------------------------------------------------

  def render
    base   = find_segment(@position.value)
    base_pct = (@position.value % SEGMENT_LEN) / SEGMENT_LEN.to_f
    # Subtle camera shake — frequency tied to position so it scales
    # with speed automatically (faster → more buzz).
    speed_norm = @speed.value / MAX_SPEED
    shake = Math.sin(@position.value * 0.003) * speed_norm * 12
    cam_y  = CAM_HEIGHT + base["p1"]["y"] + shake
    max_y  = HEIGHT.to_f

    draw_sky_and_ground

    x  = 0.0
    dx = -(base_pct * base["curve"])

    DRAW_DIST.times do |n|
      seg_idx = (base["index"] + n) % @segments.length
      seg = @segments[seg_idx]
      looped = seg_idx < base["index"]
      cam_z = @position.value - (looped ? @track_length : 0.0)

      project(seg["p1"], (@player_x.value * ROAD_WIDTH) - x,        cam_y, cam_z)
      project(seg["p2"], (@player_x.value * ROAD_WIDTH) - x - dx,   cam_y, cam_z)

      # Stash the accumulated curve offset so draw_sprites can keep
      # roadside objects glued to the road as it bends.
      seg["curve_x"] = x

      x  += dx
      dx += seg["curve"]

      next if seg["p1"]["scale"] <= 0
      next if seg["p2"]["sy"] >= seg["p1"]["sy"]
      next if seg["p2"]["sy"] >= max_y

      draw_segment(seg)
      max_y = seg["p2"]["sy"]
    end

    draw_sprites(base)
    draw_speed_lines
    draw_player_car
  end

  def project(p, cam_x, cam_y, cam_z)
    cz = p["z"] - cam_z
    cz = 0.001 if cz < 0.001
    scale = CAM_DEPTH / cz
    p["sx"]    = ((WIDTH  / 2) + (scale * (0.0 - cam_x) * WIDTH  / 2)).round
    p["sy"]    = ((HEIGHT / 2) - (scale * (p["y"] - cam_y) * HEIGHT / 2)).round
    p["sw"]    = (scale * ROAD_WIDTH * WIDTH / 2).round
    p["scale"] = scale
  end

  def draw_sky_and_ground
    fill(COLORS[:sky], 0, 0, WIDTH, HEIGHT / 2)
    fill(COLORS[:grass_dark], 0, HEIGHT / 2, WIDTH, HEIGHT - HEIGHT / 2)
  end

  def draw_segment(seg)
    p1 = seg["p1"]
    p2 = seg["p2"]
    light = seg["color"] == :light

    grass  = light ? COLORS[:grass_light]  : COLORS[:grass_dark]
    rumble = light ? COLORS[:rumble_light] : COLORS[:rumble_dark]
    road   = light ? COLORS[:road_light]   : COLORS[:road_dark]

    # Grass strip: full-width band from p2.sy to p1.sy.
    fill(grass, 0, p2["sy"], WIDTH, p1["sy"] - p2["sy"])

    # Road, rumble, and lane stripes are trapezoids — use paths.
    rumble_w1 = (p1["sw"] / 6.0).round
    rumble_w2 = (p2["sw"] / 6.0).round

    fill_trap(rumble,
              p2["sx"] - p2["sw"] - rumble_w2, p2["sy"], 2 * rumble_w2,
              p1["sx"] - p1["sw"] - rumble_w1, p1["sy"], 2 * rumble_w1)
    fill_trap(rumble,
              p2["sx"] + p2["sw"] - rumble_w2, p2["sy"], 2 * rumble_w2,
              p1["sx"] + p1["sw"] - rumble_w1, p1["sy"], 2 * rumble_w1)
    fill_trap(road,
              p2["sx"] - p2["sw"], p2["sy"], 2 * p2["sw"],
              p1["sx"] - p1["sw"], p1["sy"], 2 * p1["sw"])

    # Lane stripe down the middle (only on light segments for dashed look).
    if light
      lane_w1 = (p1["sw"] * 0.04).round
      lane_w2 = (p2["sw"] * 0.04).round
      fill_trap(COLORS[:lane],
                p2["sx"] - lane_w2, p2["sy"], 2 * lane_w2,
                p1["sx"] - lane_w1, p1["sy"], 2 * lane_w1)
    end
  end

  def draw_sprites(base)
    # Painter's algorithm: far first, near last.
    cam_z = @position.value
    cam_y = CAM_HEIGHT + base["p1"]["y"]
    @sprites.each do |spr|
      sz = spr["z"]
      sz += @track_length if sz < cam_z - SEGMENT_LEN
      cz = sz - cam_z
      next if cz <= 0 || cz > DRAW_DIST * SEGMENT_LEN

      # The segment whose render iteration this sprite sat in. Its
      # `curve_x` is the accumulated road bend at this depth — adding
      # it keeps the sprite locked to the road as it curves.
      seg = find_segment(sz)
      curve_x = seg["curve_x"] || 0.0

      scale = CAM_DEPTH / cz
      lateral_world = spr["x"] * ROAD_WIDTH
      cam_x = @player_x.value * ROAD_WIDTH - curve_x
      sx = ((WIDTH / 2) + (scale * (lateral_world - cam_x) * WIDTH / 2)).round
      sy = ((HEIGHT / 2) - (scale * (seg["p1"]["y"] - cam_y) * HEIGHT / 2)).round

      case spr["kind"]
      when :tree then draw_tree(sx, sy, scale)
      when :sign then draw_sign(sx, sy, scale)
      end
    end
  end

  def draw_tree(sx, sy, scale)
    h = (scale * 1500 * HEIGHT / 2).round   # world height ≈ 1500
    return if h < 3
    w = [h / 3, 4].max
    trunk_h = [h / 3, 2].max
    fill(COLORS[:tree_trunk], sx - w / 6, sy - trunk_h, w / 3, trunk_h)
    fill(COLORS[:tree_leaves], sx - w / 2, sy - h, w, h - trunk_h)
  end

  def draw_sign(sx, sy, scale)
    h = (scale * 1000 * HEIGHT / 2).round   # world height ≈ 1000
    return if h < 3
    w = [h * 2 / 3, 4].max
    pole_h = h / 2
    fill(COLORS[:sign_pole], sx - 1, sy - pole_h, 2, pole_h)
    fill(COLORS[:sign_face], sx - w / 2, sy - h, w, h - pole_h)
  end

  # Vertical motion lines on the canvas edges — kicks in above ~30%
  # of max speed so the slow start isn't cluttered.
  def draw_speed_lines
    speed_norm = @speed.value / MAX_SPEED
    return if speed_norm < 0.3
    alpha = (speed_norm - 0.3) / 0.7
    alpha = 0.65 if alpha > 0.65
    @speed_lines_phase = (@speed_lines_phase + @speed.value * 6.0) % HEIGHT
    count = 6
    step = HEIGHT.to_f / count
    count.times do |i|
      y = ((@speed_lines_phase + i * step) % HEIGHT).to_i
      fill("rgba(255,255,255,#{alpha})", 6, y, 3, 24)
      fill("rgba(255,255,255,#{alpha})", WIDTH - 9, y, 3, 24)
    end
  end

  def draw_player_car
    # Anchored at bottom-center of canvas.
    cx = WIDTH / 2
    cy = HEIGHT - 36
    body_w = 80
    body_h = 24
    fill(COLORS[:car_body], cx - body_w / 2, cy, body_w, body_h)
    # Roof / cabin
    fill(COLORS[:car_window], cx - body_w / 2 + 14, cy - 14, body_w - 28, 14)
    # Wheels
    fill(COLORS[:car_wheel], cx - body_w / 2 + 4, cy + body_h - 6, 14, 8)
    fill(COLORS[:car_wheel], cx + body_w / 2 - 18, cy + body_h - 6, 14, 8)
  end

  # ---- Canvas helpers ---------------------------------------------

  def fill(color, x, y, w, h)
    return if w <= 0 || h <= 0
    @ctx[:fillStyle] = color
    @ctx.call(:fillRect, x, y, w, h)
  end

  def fill_trap(color, x1, y1, w1, x2, y2, w2)
    @ctx[:fillStyle] = color
    @ctx.call(:beginPath)
    @ctx.call(:moveTo, x1,       y1)
    @ctx.call(:lineTo, x1 + w1,  y1)
    @ctx.call(:lineTo, x2 + w2,  y2)
    @ctx.call(:lineTo, x2,       y2)
    @ctx.call(:closePath)
    @ctx.call(:fill)
  end

  def clamp(v, min, max)
    v < min ? min : v > max ? max : v
  end
end

Grainet.register "racer", Racer
Grainet.start
puts "racer demo mounted"
    </script>

    <script type="module">
      import { createVM } from "../mrbgem/mruby-wasm-js/js/index.js";
      const boot = document.getElementById("boot");
      try {
        const vm = await createVM({ wasm: "../build/mruby-js-grainet-full.wasm" });
        // Expose for the Ruby side to sample WASM linear memory and
        // JS-side handle count for the stats overlay.
        globalThis.__racer_vm = vm;
        vm.evalScript("#ruby-source");
        boot.textContent = "ready — focus this page and press the arrow keys";
      } catch (err) {
        console.error(err);
        boot.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
