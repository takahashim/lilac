<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grainet — counter demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 2em auto;
        padding: 0 1em;
      }
      .panel {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1em 1.2em;
        margin: 1em 0;
      }
      .panel h2 { margin-top: 0; font-size: 1em; color: #555; }
      .row { display: flex; gap: 0.5em; align-items: center; }
      button {
        padding: 0.4em 0.9em;
        border-radius: 6px;
        border: 1px solid #b94f3f;
        background: #b94f3f;
        color: #fff;
        cursor: pointer;
      }
      .num {
        font: 700 1.1em ui-monospace, monospace;
        min-width: 2em;
        text-align: center;
      }
      .msg { color: #666; font-style: italic; min-height: 1.5em; }
    </style>
  </head>
  <body>
    <h1>Grainet Counter</h1>
    <p>A simple counter with increment, decrement, and reset controls.</p>

    <div class="panel" data-widget="counter">
      <h2>Counter</h2>
      <div class="row">
        <button data-ref="decrement">-</button>
        <span class="num" data-ref="count">0</span>
        <button data-ref="increment">+</button>
        <button data-ref="reset">reset</button>
      </div>
      <p class="msg" data-ref="message"></p>
    </div>

    <p id="status">booting…</p>

    <script type="text/ruby" id="ruby-source">
class Counter < Grainet::Widget
  def setup
    @count = signal(0)

    refs.increment.on(:click) { @count.update { |n| n + 1 } }
    refs.decrement.on(:click) { @count.update { |n| n - 1 } }
    refs.reset.on(:click)     { @count.value = 0 }

    bind refs.count, text: @count

    bind refs.message, :text do
      case @count.value
      when 0
        "zero"
      when 1..Float::INFINITY
        "positive"
      else
        "negative"
      end
    end
  end
end

Grainet.register "counter", Counter
Grainet.start
puts "counter widget mounted"
    </script>

    <script type="module">
      import { createVM } from "../mrbgem/mruby-wasm-js/js/index.js";
      const status = document.getElementById("status");
      try {
        const vm = await createVM({ wasm: "../build/mruby-js-grainet-full.wasm" });
        vm.evalScript("#ruby-source");
        status.textContent = "ready";
      } catch (err) {
        console.error(err);
        status.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
