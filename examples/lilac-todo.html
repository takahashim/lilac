<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lilac — todo demo (bind_list)</title>
    <style>
      :root {
        --bg: #fafafa; --panel: #fff; --border: #e5e5e5;
        --accent: #b94f3f; --muted: #888; --text: #222;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 560px; margin: 0 auto; padding: 2em 1em;
        line-height: 1.55; color: var(--text); background: var(--bg);
      }
      h1 { margin: 0 0 0.3em 0; }
      .lede { color: var(--muted); margin-top: 0; }
      .panel {
        background: var(--panel); padding: 1em 1.2em; border-radius: 10px;
        margin: 1em 0; border: 1px solid var(--border);
      }
      .row { display: flex; gap: 0.5em; align-items: center; }
      input[type="text"] {
        flex: 1; font-size: 1em; padding: 0.45em 0.7em;
        border: 1px solid var(--border); border-radius: 6px;
      }
      button {
        font-size: 1em; padding: 0.45em 0.95em; border-radius: 6px;
        border: 1px solid var(--accent); background: var(--accent);
        color: white; cursor: pointer;
      }
      button:hover { opacity: 0.88; }
      ul.todos {
        list-style: none; padding: 0; margin: 1em 0 0 0;
        display: flex; flex-direction: column; gap: 0.4em;
      }
      ul.todos li {
        display: flex; align-items: center; gap: 0.6em;
        padding: 0.5em 0.7em; border-radius: 6px;
        background: var(--bg); border: 1px solid var(--border);
        cursor: grab;
      }
      ul.todos li:active { cursor: grabbing; }
      ul.todos li.is-dragging { opacity: 0.4; }
      ul.todos li.drop-before { box-shadow: 0 -2px 0 0 var(--accent) inset; }
      ul.todos li.drop-after  { box-shadow: 0  2px 0 0 var(--accent) inset; }
      ul.todos li .handle {
        color: var(--muted); font-size: 1.1em; line-height: 1;
        user-select: none; padding: 0 0.1em;
      }
      ul.todos li span.title { flex: 1; }
      .dismiss {
        background: transparent; border: 1px solid transparent;
        color: var(--muted); font-size: 1.1em; line-height: 1;
        padding: 0.1em 0.4em; cursor: pointer;
      }
      .dismiss:hover { color: var(--accent); border-color: var(--border); }
      .status { color: var(--muted); font-size: 0.9em; margin-top: 0.6em; }
      #boot { color: var(--muted); font-size: 0.85em; margin-top: 2em; }
      .overlay {
        position: fixed; inset: 0;
        background: rgba(20, 20, 20, 0.45);
        display: flex; align-items: center; justify-content: center;
        z-index: 100; padding: 1em;
      }
      .overlay[hidden] { display: none; }
      .overlay .dialog {
        background: var(--panel); border-radius: 10px;
        padding: 1.2em 1.5em; max-width: 400px; width: 100%;
        box-shadow: 0 14px 40px rgba(0,0,0,0.25);
        border-top: 4px solid #d4a000;
      }
      .overlay .dialog h3 { margin: 0 0 0.6em 0; font-size: 1.05em; color: #a07800; }
      .overlay .dialog p  { margin: 0 0 1em 0; }
      .overlay .dialog .actions { display: flex; justify-content: flex-end; }
      .overlay .dialog button {
        font-size: 0.9em; padding: 0.4em 0.9em; border-radius: 6px;
        border: 1px solid var(--accent); background: var(--accent);
        color: white; cursor: pointer;
      }
      .overlay .dialog button:hover { opacity: 0.88; }
    </style>
  </head>
  <body>
    <h1>Lilac — todo demo</h1>
    <p class="lede">
      A simple todo list with add, remove, and drag-to-reorder.
    </p>

    <!-- The data-each `<ul>`'s inline `<li>` is captured as the row
         template at mount time; bind_list owns rendering after that. -->
    <div data-component="TodoList" class="panel">
      <div class="overlay" data-attr-hidden="@notice_hidden">
        <div class="dialog" role="dialog" aria-labelledby="notice-title">
          <h3 id="notice-title">入力エラー</h3>
          <p data-text="@notice_text"></p>
          <div class="actions">
            <button type="button" data-on-click="clear_notice">OK</button>
          </div>
        </div>
      </div>
      <form class="row" novalidate>
        <input data-ref="input" type="text" placeholder="What needs doing?">
        <button type="submit">Add</button>
      </form>
      <ul data-ref="list" class="todos" data-each="@items" data-key="id">
        <li data-component="TodoItem"
            draggable="true"
            data-prop-id="it.id"
            data-prop-title="it.title">
          <span class="handle" aria-hidden="true">⋮⋮</span>
          <span class="title" data-text="@title"></span>
          <button class="dismiss" aria-label="delete" data-on-click="dismiss">×</button>
        </li>
      </ul>
      <p class="status" data-text="@status_text"></p>
    </div>

    <p id="boot">booting…</p>

    <script type="text/ruby" id="ruby-source">
# Each <li> is its own component. lifecycle scoped to the row: when
# data-each removes the <li>, the MutationObserver unmounts this and
# the click handler / cleanup is released.
class TodoItem < Lilac::Component
  include Lilac::Sortable::Item

  prop :id, Integer
  prop :title, String

  def setup
    make_sortable(by: @id)
  end

  # bubbles: true lets the event cross the data-component boundary up
  # to the parent TodoList, which resolves the TodoItem via
  # `component_for(event.target)` and reads its `id` prop.
  def dismiss(_ev)
    root.dispatch(:item_dismissed, bubbles: true)
  end
end

class TodoList < Lilac::Component
  include Lilac::Sortable::List

  def setup
    @next_id = signal(3)
    @items   = signal([
      { "id" => 1, "title" => "Read the spec" },
      { "id" => 2, "title" => "Try class & style binding" },
    ])

    @form = form do |f|
      f.field :title, ref: refs.input, initial: "" do |field|
        required(field.value)
      end
    end

    @notice = signal(nil)
    @notice_hidden = computed { @notice.value.nil? }
    @notice_text   = computed { @notice.value.to_s }

    @status_text = computed do
      n = @items.value.length
      case n
      when 0 then "all done!"
      when 1 then "1 item"
      else        "#{n} items"
      end
    end

    sortable_target refs.list

    root.on(:submit) do |event|
      event.preventDefault
      unless @form.valid?
        @notice.value = "タイトルを入力してください。"
        next
      end
      @form.submit do |values|
        add_item(values[:title])
        @form.reset
      end
    end

    root.on(:item_dismissed) do |event|
      item = component_for(event[:target])
      next unless item
      id = item.id
      @items.update { |arr| arr.reject { |it| it["id"] == id } }
    end
  end

  def clear_notice(_ev) = @notice.value = nil

  private

  def add_item(title)
    id = @next_id.value
    @next_id.update { |n| n + 1 }
    @items.update { |arr| arr + [{ "id" => id, "title" => title }] }
  end
end

Lilac.register "TodoList", TodoList
Lilac.register "TodoItem", TodoItem
Lilac.start
puts "todo demo (bind_list) mounted"
    </script>

    <script type="module">
      import { createVM } from "../mrbgem/mruby-wasm-js/js/index.js";
      const boot = document.getElementById("boot");
      try {
        const vm = await createVM({ wasm: "../build/mruby-js-lilac-full.wasm" });
        vm.evalScript("#ruby-source");
        boot.textContent = "ready — type and press Enter / click Add";
      } catch (err) {
        console.error(err);
        boot.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
