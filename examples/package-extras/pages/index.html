<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lilac package demo — data-tooltip / data-autofocus</title>
</head>
<body>
  <h1>Lilac package demo</h1>
  <p>
    Built with <code>lilac build --target compiled</code>. The
    <code>data-tooltip</code> / <code>data-autofocus</code> directives
    come from the <code>lilac-extras</code> gem, picked up by
    Bundler auto-discovery (no <code>c.packages</code> override
    needed in <code>lilac.config.rb</code>).
  </p>
  <lilac-component name="tooltip-demo"></lilac-component>
</body>
</html>
