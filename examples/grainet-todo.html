<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grainet — todo demo (bind_list)</title>
    <style>
      :root {
        --bg: #fafafa; --panel: #fff; --border: #e5e5e5;
        --accent: #b94f3f; --muted: #888; --text: #222;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 560px; margin: 0 auto; padding: 2em 1em;
        line-height: 1.55; color: var(--text); background: var(--bg);
      }
      h1 { margin: 0 0 0.3em 0; }
      .lede { color: var(--muted); margin-top: 0; }
      .panel {
        background: var(--panel); padding: 1em 1.2em; border-radius: 10px;
        margin: 1em 0; border: 1px solid var(--border);
      }
      .row { display: flex; gap: 0.5em; align-items: center; }
      input[type="text"] {
        flex: 1; font-size: 1em; padding: 0.45em 0.7em;
        border: 1px solid var(--border); border-radius: 6px;
      }
      button {
        font-size: 1em; padding: 0.45em 0.95em; border-radius: 6px;
        border: 1px solid var(--accent); background: var(--accent);
        color: white; cursor: pointer;
      }
      button:hover { opacity: 0.88; }
      ul.todos {
        list-style: none; padding: 0; margin: 1em 0 0 0;
        display: flex; flex-direction: column; gap: 0.4em;
      }
      ul.todos li {
        display: flex; align-items: center; gap: 0.6em;
        padding: 0.5em 0.7em; border-radius: 6px;
        background: var(--bg); border: 1px solid var(--border);
      }
      ul.todos li span { flex: 1; }
      .dismiss {
        background: transparent; border: 1px solid transparent;
        color: var(--muted); font-size: 1.1em; line-height: 1;
        padding: 0.1em 0.4em; cursor: pointer;
      }
      .dismiss:hover { color: var(--accent); border-color: var(--border); }
      .status { color: var(--muted); font-size: 0.9em; margin-top: 0.6em; }
      #boot { color: var(--muted); font-size: 0.85em; margin-top: 2em; }
      .overlay {
        position: fixed; inset: 0;
        background: rgba(20, 20, 20, 0.45);
        display: flex; align-items: center; justify-content: center;
        z-index: 100; padding: 1em;
      }
      .overlay[hidden] { display: none; }
      .overlay .dialog {
        background: var(--panel); border-radius: 10px;
        padding: 1.2em 1.5em; max-width: 400px; width: 100%;
        box-shadow: 0 14px 40px rgba(0,0,0,0.25);
        border-top: 4px solid #d4a000;
      }
      .overlay .dialog h3 { margin: 0 0 0.6em 0; font-size: 1.05em; color: #a07800; }
      .overlay .dialog p  { margin: 0 0 1em 0; }
      .overlay .dialog .actions { display: flex; justify-content: flex-end; }
      .overlay .dialog button {
        font-size: 0.9em; padding: 0.4em 0.9em; border-radius: 6px;
        border: 1px solid var(--accent); background: var(--accent);
        color: white; cursor: pointer;
      }
      .overlay .dialog button:hover { opacity: 0.88; }
    </style>
  </head>
  <body>
    <h1>Grainet — todo demo</h1>
    <p class="lede">
      A simple todo list with add and remove actions.
    </p>

    <!-- The <ul> is empty in the seed HTML; bind_list owns its children. -->
    <div data-widget="todo-list" class="panel">
      <div data-ref="notice_overlay" class="overlay" hidden>
        <div class="dialog" role="dialog" aria-labelledby="notice-title">
          <h3 id="notice-title">入力エラー</h3>
          <p data-ref="notice_text"></p>
          <div class="actions">
            <button data-ref="notice_dismiss" type="button">OK</button>
          </div>
        </div>
      </div>
      <form class="row" novalidate>
        <input data-ref="input" type="text" placeholder="What needs doing?">
        <button data-ref="add" type="submit">Add</button>
      </form>
      <ul data-ref="list" class="todos"></ul>
      <p class="status" data-ref="status"></p>
    </div>

    <!-- Row markup lives here as inert template content. bind_list
         clones it per item; setup_row fills in title + data-id. -->
    <template data-template="todo-row">
      <li data-widget="todo-item">
        <span data-ref="title"></span>
        <button class="dismiss" data-ref="dismiss" aria-label="delete">×</button>
      </li>
    </template>

    <p id="boot">booting…</p>

    <script type="text/ruby" id="ruby-source">
# Each <li> is its own widget. lifecycle scoped to the row: when
# bind_list removes the <li>, the MutationObserver unmounts this and
# the click handler / cleanup is released.
class TodoItem < Grainet::Widget
  def setup
    refs.dismiss.on(:click) do
      # bubbles: true lets the event cross the data-widget boundary up
      # to the parent TodoList. event.target on the parent side is the
      # <li> that fired, so the parent can read its data-id.
      root.dispatch(:item_dismissed, bubbles: true)
    end
  end
end

class TodoList < Grainet::Widget
  def setup
    @next_id = signal(3)
    @items   = signal([
      { "id" => 1, "title" => "Read the spec" },
      { "id" => 2, "title" => "Try class & style binding" },
    ])

    @form = form do |f|
      f.field :title, ref: refs.input, initial: "" do |field|
        required(field.value)
      end
    end

    @notice = signal(nil)
    bind refs.notice_overlay, hidden: computed { @notice.value.nil? }
    bind refs.notice_text,    text:   computed { @notice.value.to_s }
    refs.notice_dismiss.on(:click) { @notice.value = nil }

    root.on(:submit) do |event|
      event.preventDefault
      unless @form.valid?
        @notice.value = "タイトルを入力してください。"
        next
      end
      @form.submit do |values|
        add_item(values[:title])
        @form.reset
      end
    end

    root.on(:item_dismissed) do |event|
      id = ref(event[:target]).data(:id).to_i
      @items.update { |arr| arr.reject { |it| it["id"] == id } }
    end

    # The whole list rendering. The <template data-template="todo-row">
    # in the page holds the row markup; bind_list clones it per item
    # and fills the title slot. Returning the same JS node when prev
    # is set keeps the row's todo-item widget mounted across updates.
    bind_list refs.list, @items, key: "id", template: "todo-row" do |it, t|
      t.data(:id, it["id"])
      t.refs.title.text = it["title"]
    end

    bind refs.status, :text do
      n = @items.value.length
      case n
      when 0 then "all done!"
      when 1 then "1 item"
      else        "#{n} items"
      end
    end
  end

  private

  def add_item(title)
    id = @next_id.value
    @next_id.update { |n| n + 1 }
    @items.update { |arr| arr + [{ "id" => id, "title" => title }] }
  end
end

Grainet.register "todo-list", TodoList
Grainet.register "todo-item", TodoItem
Grainet.start
puts "todo demo (bind_list) mounted"
    </script>

    <script type="module">
      import { createVM } from "../mrbgem/mruby-wasm-js/js/index.js";
      const boot = document.getElementById("boot");
      try {
        const vm = await createVM({ wasm: "../build/mruby-js.wasm" });
        vm.evalScript("#ruby-source");
        boot.textContent = "ready — type and press Enter / click Add";
      } catch (err) {
        console.error(err);
        boot.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
