<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grainet — Receipt demo (URL-fragment 永続化)</title>
    <style>
      :root {
        --bg: #fafafa; --panel: #fff; --border: #e5e5e5;
        --accent: #b94f3f; --muted: #888; --text: #222;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 760px; margin: 0 auto; padding: 2em 1em;
        line-height: 1.55; color: var(--text); background: var(--bg);
      }
      h1 { margin: 0 0 0.3em 0; }
      .lede { color: var(--muted); margin-top: 0; }
      table.receipt {
        width: 100%; border-collapse: collapse; margin: 1em 0;
        background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
        overflow: hidden;
      }
      table.receipt th, table.receipt td {
        padding: 0.5em 0.7em; border-bottom: 1px solid var(--border); text-align: left;
      }
      table.receipt thead th { background: #f5f5f5; font-weight: 600; font-size: 0.9em; }
      table.receipt tfoot td { background: #f7f7f7; border-bottom: none; }
      table.receipt tfoot tr:last-child td { font-weight: 600; }
      table.receipt td.num, table.receipt th.num { text-align: right; font-variant-numeric: tabular-nums; }
      table.receipt input[type="text"], table.receipt input[type="number"] {
        width: 100%; padding: 0.3em 0.4em; font-size: inherit; font-family: inherit;
        border: 1px solid transparent; background: transparent; border-radius: 4px;
      }
      table.receipt input[type="number"] { text-align: right; font-variant-numeric: tabular-nums; }
      table.receipt input:focus { outline: none; border-color: var(--accent); background: white; }
      .dismiss {
        background: transparent; border: 1px solid transparent;
        color: var(--muted); font-size: 1.1em; line-height: 1;
        padding: 0.1em 0.4em; cursor: pointer;
      }
      .dismiss:hover { color: var(--accent); border-color: var(--border); }
      .add-button {
        font-size: 0.95em; padding: 0.4em 0.9em; border-radius: 6px;
        border: 1px solid var(--accent); background: var(--accent); color: white;
        cursor: pointer;
      }
      .add-button:hover { opacity: 0.88; }
      #boot { color: var(--muted); font-size: 0.85em; margin-top: 2em; }
    </style>
  </head>
  <body>
    <h1>Grainet — receipt demo</h1>
    <p class="lede">
      An editable receipt with line items, totals, and shareable state in the URL.
    </p>

    <div data-widget="receipt">
      <table class="receipt">
        <thead>
          <tr>
            <th>品目</th>
            <th class="num" style="width: 5em;">数量</th>
            <th class="num" style="width: 7em;">単価</th>
            <th class="num" style="width: 8em;">小計</th>
            <th style="width: 2.5em;"></th>
          </tr>
        </thead>
        <tbody data-ref="rows"></tbody>
        <tfoot>
          <tr>
            <td colspan="3">小計</td>
            <td class="num" data-ref="subtotal"></td>
            <td></td>
          </tr>
          <tr>
            <td colspan="3">消費税 (10%)</td>
            <td class="num" data-ref="tax"></td>
            <td></td>
          </tr>
          <tr>
            <td colspan="3">合計</td>
            <td class="num" data-ref="total"></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <button data-ref="add" class="add-button" type="button">+ 行を追加</button>
    </div>

    <template data-template="line-row">
      <tr>
        <td><input data-ref="description" type="text" placeholder="品目"></td>
        <td class="num"><input data-ref="qty" type="number" min="0" inputmode="numeric"></td>
        <td class="num"><input data-ref="unit_price" type="number" min="0" inputmode="numeric"></td>
        <td class="num" data-ref="line_total"></td>
        <td><button data-ref="remove" class="dismiss" type="button" aria-label="delete">×</button></td>
      </tr>
    </template>

    <p id="boot">booting…</p>

    <script type="text/ruby" id="receipt-source">
class Receipt < Grainet::Widget
  HASH_PREFIX = "#state="

  def exposes
    @items = signal(load_from_url || default_items)
    @next_id = signal((@items.value.map { |it| it["id"] }.max || 0) + 1)
  end

  def setup
    @subtotal = computed do
      @items.value.sum { |it| it["qty"].value.to_i * it["unit_price"].value.to_i }
    end
    @tax   = computed { (@subtotal.value * 0.1).round }
    @total = computed { @subtotal.value + @tax.value }

    bind refs.subtotal, text: computed { format_yen(@subtotal.value) }
    bind refs.tax,      text: computed { format_yen(@tax.value) }
    bind refs.total,    text: computed { format_yen(@total.value) }

    bind_list refs.rows, @items, key: "id", template: "line-row" do |it, t|
      # この block が demo の中核 — bind_list の row template に対して
      # model を貼ると、各 input が個別 signal に直結する。
      model t.refs.description, it["description"]
      model t.refs.qty,         it["qty"]
      model t.refs.unit_price,  it["unit_price"]

      bind t.refs.line_total, text: computed {
        format_yen(it["qty"].value.to_i * it["unit_price"].value.to_i)
      }

      t.refs.remove.on(:click) do
        @items.update { |arr| arr.reject { |x| x["id"] == it["id"] } }
      end
    end

    refs.add.on(:click) { add_row }

    # signal → URL の片方向 sync。replaceState 経由で history を汚さない。
    effect(label: "url-sync") do
      snapshot = @items.value.map do |it|
        { "id" => it["id"],
          "description" => it["description"].value,
          "qty"         => it["qty"].value,
          "unit_price"  => it["unit_price"].value }
      end
      encoded = JS.encode_uri_component(Grainet::JSON.generate(snapshot))
      JS.global[:history].call(:replaceState,
                               JS.global[:history][:state], "",
                               "#{HASH_PREFIX}#{encoded}")
    end
  end

  private

  def add_row
    id = @next_id.value
    @next_id.update { |n| n + 1 }
    @items.update do |arr|
      arr + [{ "id" => id,
               "description" => signal(""),
               "qty" => signal("1"),
               "unit_price" => signal("0") }]
    end
  end

  def signalize_row(h)
    { "id" => h["id"].to_i,
      "description" => signal(h["description"].to_s),
      "qty"         => signal(h["qty"].to_s),
      "unit_price"  => signal(h["unit_price"].to_s) }
  end

  # Tolerant load: 空 / 別形式の hash や壊れた JSON はすべて nil 返しで
  # default_items にフォールバック。
  def load_from_url
    hash = JS.global[:location][:hash].to_s
    return nil if hash.empty? || !hash.start_with?(HASH_PREFIX)
    encoded = hash[HASH_PREFIX.length..-1]
    json = JS.decode_uri_component(encoded)
    parsed = Grainet::JSON.parse(json)
    return nil unless parsed.is_a?(Array)
    parsed.map { |h| signalize_row(h) }
  rescue JS::Error
    nil
  end

  def default_items
    [
      { "id" => 1, "description" => signal("コーヒー"),       "qty" => signal("2"), "unit_price" => signal("450") },
      { "id" => 2, "description" => signal("チーズケーキ"), "qty" => signal("1"), "unit_price" => signal("680") },
    ]
  end

  def format_yen(n)
    s = n.to_i.abs.to_s
    groups = []
    i = s.length
    while i > 3
      groups.unshift(s[i - 3, 3])
      i -= 3
    end
    groups.unshift(s[0, i]) if i > 0
    sign = n < 0 ? "-" : ""
    "#{sign}¥#{groups.join(",")}"
  end
end

Grainet.register "receipt", Receipt
Grainet.start
puts "receipt demo mounted"
    </script>

    <script type="module">
      import { createVM } from "../mrbgem/mruby-wasm-js/js/index.js";
      const boot = document.getElementById("boot");
      try {
        const vm = await createVM({ wasm: "../build/mruby-js.wasm" });
        vm.evalScript("#receipt-source");
        boot.textContent = "ready — qty / unit_price を編集して URL bar の #state を確認、別タブにコピペで復元";
      } catch (err) {
        console.error(err);
        boot.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
