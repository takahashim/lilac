<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grainet — JSON filter demo</title>
    <style>
      :root {
        --bg: #fafafa; --panel: #fff; --border: #e5e5e5;
        --accent: #b94f3f; --muted: #888; --text: #222;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 620px; margin: 0 auto; padding: 2em 1em;
        line-height: 1.55; color: var(--text); background: var(--bg);
      }
      h1 { margin: 0 0 0.3em 0; }
      .lede { color: var(--muted); margin-top: 0; }
      .panel {
        background: var(--panel); padding: 1em 1.2em; border-radius: 10px;
        margin: 1em 0; border: 1px solid var(--border);
      }
      .row { display: flex; gap: 0.5em; align-items: center; }
      input[type="text"] {
        flex: 1; font-size: 1em; padding: 0.5em 0.7em;
        border: 1px solid var(--border); border-radius: 6px;
      }
      select {
        font-size: 1em; padding: 0.5em 0.6em;
        border: 1px solid var(--border); border-radius: 6px;
        background: white;
      }
      .status {
        color: var(--muted); font-size: 0.85em; margin: 0.5em 0 0.2em 0;
      }
      .status.error { color: var(--accent); }
      ul.results {
        list-style: none; padding: 0; margin: 0.6em 0 0 0;
        display: flex; flex-direction: column; gap: 0.3em;
      }
      ul.results li {
        display: flex; align-items: center; gap: 0.6em;
        padding: 0.45em 0.8em; border-radius: 6px;
        background: var(--bg); border: 1px solid var(--border);
      }
      ul.results .name { flex: 1; }
      ul.results .code {
        font: 600 0.85em ui-monospace, monospace;
        color: var(--muted);
      }
      ul.results .region {
        font-size: 0.8em; color: var(--muted);
        background: white; padding: 0.1em 0.6em;
        border-radius: 999px; border: 1px solid var(--border);
      }
      .empty {
        color: var(--muted); padding: 1em; text-align: center;
        font-style: italic;
      }
      #boot { color: var(--muted); font-size: 0.85em; margin-top: 2em; }
    </style>
  </head>
  <body>
    <h1>Grainet — country search demo</h1>
    <p class="lede">
      Search and filter a list of countries by name and region.
    </p>

    <div data-widget="country-picker" class="panel">
      <div class="row">
        <input data-ref="query" type="text" placeholder="国名 (英語) を入力…">
        <select data-ref="region">
          <option value="">All regions</option>
          <option value="Asia">Asia</option>
          <option value="Americas">Americas</option>
          <option value="Europe">Europe</option>
          <option value="Oceania">Oceania</option>
          <option value="Africa">Africa</option>
        </select>
      </div>
      <p data-ref="status" class="status">loading…</p>
      <ul data-ref="results" class="results"></ul>
    </div>

    <p id="boot">booting…</p>

    <script type="text/ruby" id="ruby-source">
class CountryPicker < Grainet::Widget
  def setup
    @query   = signal("")
    @region  = signal("")
    @items   = resource(initial: []) do |r|
      Fetchy.json("./data/countries.json", timeout: 5000, signal: r.abort_signal)
    end

    # Two-way bind for both inputs.
    model refs.query,  @query
    model refs.region, @region

    # Filter computed from @items + @query + @region. computed skips
    # downstream notifies when the result is the same Array (== check),
    # so typing characters that don't change the filter is a no-op.
    @filtered = computed do
      q = @query.value.downcase.strip
      r = @region.value
      @items.value.select do |it|
        next false if !r.empty? && it["region"] != r
        next true  if q.empty?
        it["name"].downcase.include?(q)
      end
    end

    bind refs.status, class: { "error" => computed { !@items.error.nil? } }

    bind refs.status, :text do
      if @items.loading?
        "loading…"
      elsif @items.error
        "error: #{@items.error.is_a?(Fetchy::TimeoutError) ? "request timed out" : @items.error.message}"
      else
        n     = @filtered.value.length
        total = @items.value.length
        n == total ? "#{total} countries" : "#{n} of #{total}"
      end
    end

    # Each row is keyed by ISO code so DOM nodes survive across filter
    # changes — no flicker, no focus loss on the input.
    bind_list refs.results, @filtered, key: ->(it) { it["code"] } do |it|
      HTML(:li, [
        HTML(:span, it["name"], class: "name"),
        HTML(:span, it["code"], class: "code"),
        HTML(:span, it["region"], class: "region"),
      ])
    end

  end
end

Grainet.register "country-picker", CountryPicker
Grainet.start
puts "search demo mounted"
    </script>

    <script type="module">
      import { createVM } from "../mrbgem/mruby-wasm-js/js/index.js";
      const boot = document.getElementById("boot");
      try {
        const vm = await createVM({ wasm: "../build/mruby-js.wasm" });
        vm.evalScript("#ruby-source");
        boot.textContent = "ready — try typing or filtering by region";
      } catch (err) {
        console.error(err);
        boot.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
