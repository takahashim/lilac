<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grainet — form demo</title>
    <style>
      :root {
        --bg: #fafafa; --panel: #fff; --border: #e5e5e5;
        --accent: #b94f3f; --ok: #2a7a4e; --err: #c4452f;
        --text: #222; --muted: #888;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 560px; margin: 0 auto; padding: 2em 1em;
        line-height: 1.55; color: var(--text); background: var(--bg);
      }
      h1 { margin: 0 0 0.3em 0; }
      h2 { margin: 0 0 0.6em 0; font-size: 1.05em; }
      .lede { color: var(--muted); margin-top: 0; }
      .panel {
        background: var(--panel); padding: 1em 1.2em; border-radius: 10px;
        margin: 1em 0; border: 1px solid var(--border);
      }
      .field { margin: 0.6em 0; }
      .field label { display: block; font-size: 0.9em; color: var(--muted); margin-bottom: 0.2em; }
      .field input {
        width: 100%; font-size: 1em; padding: 0.45em 0.7em;
        border: 1px solid var(--border); border-radius: 6px;
        transition: border-color 120ms;
      }
      .field.is-invalid input { border-color: var(--err); }
      .field.is-valid   input { border-color: var(--ok); }
      .error {
        font-size: 0.85em; color: var(--err); margin: 0.2em 0 0 0;
      }
      .error[hidden] { display: none; }
      .base-error {
        font-size: 0.9em; color: var(--err); margin: 0.8em 0 0 0;
      }
      .base-error[hidden] { display: none; }
      .checkbox { display: flex; align-items: center; gap: 0.5em; margin: 0.8em 0; }
      .row { display: flex; gap: 0.6em; align-items: center; margin-top: 0.8em; }
      button {
        font-size: 1em; padding: 0.45em 1em; border-radius: 6px;
        border: 1px solid var(--accent); background: var(--accent);
        color: white; cursor: pointer; transition: opacity 120ms;
      }
      button:disabled {
        background: var(--border); border-color: var(--border);
        color: var(--muted); cursor: not-allowed;
      }
      button:not(:disabled):hover { opacity: 0.88; }
      .status { color: var(--muted); font-size: 0.9em; }
      #boot { color: var(--muted); font-size: 0.85em; margin-top: 2em; }
    </style>
  </head>
  <body>
    <h1>Grainet — form demo</h1>
    <p class="lede">
      A sign-up form with live validation, submission feedback, and an
      activity log.
    </p>

    <div data-widget="activity-log">
      <div class="panel">
        <h2>Activity</h2>
        <p class="status" data-ref="log">no submissions yet.</p>
      </div>

      <form data-widget="signup-form" class="panel" novalidate>
        <h2>Sign up</h2>

        <div class="field" data-ref="email_field">
          <label>Email</label>
          <input data-ref="email" type="email" placeholder="you@example.com">
          <p class="error" data-ref="email_error" hidden>enter a valid address</p>
        </div>

        <div class="field" data-ref="password_field">
          <label>Password</label>
          <input data-ref="password" type="password" placeholder="8+ characters">
          <p class="error" data-ref="password_error" hidden>at least 8 characters</p>
        </div>

        <div class="field" data-ref="password_confirm_field">
          <label>Password (confirm)</label>
          <input data-ref="password_confirm" type="password" placeholder="re-enter password">
          <p class="error" data-ref="password_confirm_error" hidden>passwords don't match</p>
        </div>

        <label class="checkbox">
          <input data-ref="terms" type="checkbox">
          I accept the (imaginary) terms.
        </label>

        <p class="base-error" data-ref="base_error" hidden>Could not sign up. Please try again.</p>

        <div class="row">
          <button data-ref="submit" type="submit">Sign up</button>
          <span class="status" data-ref="hint"></span>
        </div>
      </form>
    </div>

    <p id="boot">booting…</p>

    <script type="text/ruby" id="ruby-source">
class SignupForm < Grainet::Widget
  def setup
    @form = form do |f|
      f.field :email, ref: refs.email, initial: "" do |field|
        required(field.value, message: "enter your email") ||
          min_length(field.value, 4, message: "enter a valid address") ||
          (field.value.include?("@") ? nil : "must include @")
      end
      f.field :password, ref: refs.password, initial: "" do |field|
        required(field.value, message: "enter your password") ||
          min_length(field.value, 8, message: "at least 8 characters")
      end
      f.field :password_confirm, ref: refs.password_confirm, initial: "" do |field|
        required(field.value, message: "re-enter your password")
      end
      f.field :terms, ref: refs.terms, initial: false, type: :checkbox do |field|
        acceptance(field.value, message: "please accept the terms")
      end

      # Form-level validator: cross-field check for password match.
      # Field-level "required" still wins (= confirm shows "required"
      # while empty; once filled, this fires if it doesn't match).
      f.validate do |form|
        if form[:password].value != form[:password_confirm].value
          { password_confirm: "passwords don't match" }
        end
      end
    end

    email    = @form[:email]
    password = @form[:password]
    confirm  = @form[:password_confirm]
    terms    = @form[:terms]

    bind refs.email_field, class: {
      "is-invalid" => computed { email.show_error? },
      "is-valid"   => computed { email.touched? && email.valid? },
    }
    bind refs.password_field, class: {
      "is-invalid" => computed { password.show_error? },
      "is-valid"   => computed { password.touched? && password.valid? },
    }
    bind refs.password_confirm_field, class: {
      "is-invalid" => computed { confirm.show_error? },
      "is-valid"   => computed { confirm.touched? && confirm.valid? },
    }
    bind refs.email_error,            text: email.error_signal,
                                      hidden: computed { !email.show_error? }
    bind refs.password_error,         text: password.error_signal,
                                      hidden: computed { !password.show_error? }
    bind refs.password_confirm_error, text: confirm.error_signal,
                                      hidden: computed { !confirm.show_error? }
    bind refs.base_error, text: @form.base_error_signal,
                          hidden: computed { @form.base_error.nil? }

    bind refs.submit, disabled: computed { !@form.valid? }

    bind refs.hint, :text do
      next "ready to submit" if @form.valid?
      next "please accept the terms" if !terms.value && email.value.length > 0
      ""
    end

    root.on(:submit) do |event|
      event.preventDefault
      @form.submit do |values|
        # Demo-only stand-in for a submit-time/server-side failure.
        if values[:email] == "taken@example.com"
          @form.set_base_error("That address cannot be used right now.")
          next
        end

        # Bubbles past the form's data-widget boundary so ActivityLog
        # picks it up without coupling to this class.
        root.dispatch(:user_submitted,
          detail: { email: values[:email] },
          bubbles: true)
        @form.reset
      end
    end
  end
end

class ActivityLog < Grainet::Widget
  def setup
    @count = signal(0)
    @last_email = signal("")

    # The form's :user_submitted event arrives here via DOM bubbling.
    # We don't know — and don't need to know — the form's class.
    root.on(:user_submitted) do |event|
      detail = event[:detail]
      @last_email.value = detail[:email].to_s
      @count.update { |n| n + 1 }
    end

    bind refs.log, :text do
      n = @count.value
      if n.zero?
        "no submissions yet."
      else
        "submission ##{n} accepted (last: #{@last_email.value})"
      end
    end
  end
end

Grainet.register "signup-form",  SignupForm
Grainet.register "activity-log", ActivityLog
Grainet.start
puts "form demo mounted"
    </script>

    <script type="module">
      import { createVM } from "../mrbgem/mruby-wasm-js/js/index.js";
      const boot = document.getElementById("boot");
      try {
        const vm = await createVM({ wasm: "../build/mruby-js-grainet-full.wasm" });
        vm.evalScript("#ruby-source");
        boot.textContent = "ready — fill the form to see live validation";
      } catch (err) {
        console.error(err);
        boot.textContent = "boot failed: " + err.message;
      }
    </script>
  </body>
</html>
