<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{name}}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; }
    [data-widget="counter"] { display: flex; gap: 0.5rem; align-items: center; }
    .count { font-size: 1.5rem; min-width: 2rem; text-align: center; }
    button { font-size: 1rem; padding: 0.25rem 0.75rem; }
  </style>
</head>
<body>
  <h1>{{name}}</h1>

  <grainet-widget name="counter"></grainet-widget>

  <script type="module">
    import { createVM } from "/vendor/mruby-wasm-js/index.js";
    const vm = await createVM({
      wasm: "/vendor/mruby-js-grainet-full.wasm",
    });
    document.querySelectorAll('script[type="text/ruby"]')
      .forEach(s => vm.eval(s.textContent));
    vm.eval("Grainet.start");
  </script>
</body>
</html>
