name: release

# Build lilac-full release artifacts on each `v*` tag and publish to
# the gh-pages branch under `/v$TAG/`. The published tree is the
# canonical CDN delivery surface for `lilac-full` (ADR-28 — npm
# distribution is deprecated; consumers load from
# https://takahashim.github.io/lilac/v$TAG/index.js).

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing the release pipeline before cutting a real
  # tag. Defaults to dry-run (build only, no gh-pages push) so accidental
  # runs don't pollute the gh-pages branch.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish to gh-pages'
        type: boolean
        default: true
      version:
        description: 'Version tag (e.g. v0.0.0-test)'
        type: string
        default: 'v0.0.0-test'

# Required for peaceiris/actions-gh-pages to push to gh-pages branch.
permissions:
  contents: write

jobs:
  publish-pages:
    runs-on: ubuntu-latest
    # Resolved version: tag name on tag push, or the workflow_dispatch input.
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout lilac
        uses: actions/checkout@v6
        with:
          path: lilac

      # Same mruby-wasm-runtime pin as CI. Release artifacts must build
      # against the exact runtime version users get from
      # `@takahashim/mruby-wasm-js` on npm — bump this ref when adopting
      # a newer mruby-wasm-runtime release.
      - name: Checkout mruby-wasm-runtime
        uses: actions/checkout@v6
        with:
          repository: takahashim/mruby-wasm-runtime
          ref: v0.2.0
          path: mruby-wasm-runtime

      - name: Cache wasi-sdk tarball
        uses: actions/cache@v5
        with:
          path: ~/.cache/mruby-wasm-runtime
          key: wasi-sdk-33.0-x86_64-linux

      - name: Cache mruby clone (source only, without build)
        uses: actions/cache@v5
        with:
          path: |
            mruby-wasm-runtime/mruby
            !mruby-wasm-runtime/mruby/build
          key: mruby-4.0.0-src

      - name: Bootstrap wasi-sdk + mruby clone
        working-directory: mruby-wasm-runtime
        run: make wasi-sdk && make js

      # Release build: -Oz + strip-debug. ~322 KB brotli for lilac-full.
      - name: Build lilac-full (release)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make lilac-full-release

      - name: Stage gh-pages tree
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: |
          make pages-pack VERSION="${VERSION}"
          # Mirror to /latest/ only for stable releases (vMAJOR.MINOR.PATCH).
          # Pre-release tags like v0.1.0.pre1 / v0.1.0-rc1 must not move the
          # /latest/ pointer — npm-style "latest" tracks the newest stable
          # only, so consumers pinning to /latest/ don't get surprised by
          # an alpha/rc.
          if [[ "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            rm -rf dist-pages/latest
            cp -r "dist-pages/${VERSION}" dist-pages/latest
          else
            echo "Pre-release ${VERSION}: keeping existing /latest/"
          fi

      # peaceiris/actions-gh-pages: appends to gh-pages branch without
      # overwriting prior /v$TAG/ trees (keep_files: true), so each
      # release adds a new immutable version directory.
      # Skipped when workflow_dispatch runs with dry_run=true (the default
      # for manual runs) so test runs build but don't publish.
      - name: Publish to gh-pages
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: lilac/dist-pages
          keep_files: true
          full_commit_message: 'release: ${{ env.VERSION }}'
