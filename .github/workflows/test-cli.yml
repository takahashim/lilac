name: Test (CLI)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-cli:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout lilac
        uses: actions/checkout@v4
        with:
          path: lilac

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lilac-build

      - name: Download mruby-wasm-runtime
        uses: actions/download-artifact@v4
        with:
          name: mruby-wasm-runtime
          path: mruby-wasm-runtime

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Set up lilac dependencies
        working-directory: lilac/cli
        run: bundle install

      - name: Run cli minitest
        working-directory: lilac/cli
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: bundle exec rake test
