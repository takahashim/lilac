name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lilac
        uses: actions/checkout@v4
        with:
          path: lilac

      # Lilac's build depends on mruby-wasm-runtime as a sibling repo
      # (case Z: ENV override pointing at a local clone). Pinned to the
      # latest mruby-wasm-runtime release tag so CI sees exactly what
      # users get from `@takahashim/mruby-wasm-js` on npm — bump this
      # ref when adopting a newer mruby-wasm-runtime release.
      - name: Checkout mruby-wasm-runtime
        uses: actions/checkout@v4
        with:
          repository: takahashim/mruby-wasm-runtime
          ref: v0.2.0
          path: mruby-wasm-runtime

      - name: Checkout wasmtime-rb
        uses: actions/checkout@v4
        with:
          repository: bytecodealliance/wasmtime-rb
          ref: main
          path: wasmtime-rb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Matches mruby-wasm-runtime's CI — needed for stable
          # --experimental-wasm-exnref support.
          node-version: '24'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Build wasmtime-rb
        working-directory: wasmtime-rb
        run: bundle install && bundle exec rake compile

      - name: Set up lilac dependencies
        working-directory: lilac/cli
        run: bundle install

      # Bump cache key suffix when WASI_SDK_VERSION / MRUBY_TAG change
      # in mruby-wasm-runtime/Makefile.
      - name: Cache wasi-sdk tarball
        uses: actions/cache@v4
        with:
          path: ~/.cache/mruby-wasm-runtime
          key: wasi-sdk-33.0-x86_64-linux

      - name: Cache mruby clone
        uses: actions/cache@v4
        with:
          path: mruby-wasm-runtime/mruby
          key: mruby-4.0.0

      # mruby-wasm-runtime's Makefile owns the wasi-sdk extraction +
      # mruby clone. Lilac's Makefile reuses both from $(MRUBY_DIR) /
      # $(WASI_SDK_DIR) but doesn't bootstrap them itself, so trigger
      # them here before building lilac.
      - name: Bootstrap wasi-sdk + mruby clone
        working-directory: mruby-wasm-runtime
        run: make wasi-sdk && make js

      - name: Build lilac-full
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make lilac-full

      # Fast Ruby-only runner (default `make test`). Drives the same
      # wasm_spec/ scenarios as the Node runner but uses wasmtime-rb +
      # Dommy — no V8, no happy-dom.
      - name: Run wasm_spec (Ruby host)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make test

      # Node + happy-dom runner — cross-check against V8 to catch the
      # rare classes of bugs that only surface in the JS engine.
      - name: Run wasm_spec (Node + happy-dom)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make test-node

      - name: Run cli minitest
        working-directory: lilac/cli
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: bundle exec rake test
