name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lilac
        uses: actions/checkout@v6
        with:
          path: lilac

      - name: Checkout mruby-wasm-runtime
        uses: actions/checkout@v6
        with:
          repository: takahashim/mruby-wasm-runtime
          ref: v0.2.0
          path: mruby-wasm-runtime

      - name: Checkout wasmtime-rb
        uses: actions/checkout@v6
        with:
          repository: bytecodealliance/wasmtime-rb
          ref: main
          path: wasmtime-rb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Cache wasmtime-rb build
        id: cache-wasmtime-rb
        uses: actions/cache@v5
        with:
          path: |
            wasmtime-rb/lib
            wasmtime-rb/target
            wasmtime-rb/tmp
          key: wasmtime-rb-${{ runner.os }}-ruby-3.4-${{ hashFiles('wasmtime-rb/Gemfile.lock', 'wasmtime-rb/Cargo.lock') }}

      - name: Build wasmtime-rb
        if: steps.cache-wasmtime-rb.outputs.cache-hit != 'true'
        working-directory: wasmtime-rb
        run: bundle install && bundle exec rake compile

      - name: Install wasmtime-rb dependencies
        if: steps.cache-wasmtime-rb.outputs.cache-hit == 'true'
        working-directory: wasmtime-rb
        run: bundle install

      - name: Set up lilac dependencies
        working-directory: lilac/cli
        run: bundle install

      - name: Cache wasi-sdk tarball
        uses: actions/cache@v5
        with:
          path: ~/.cache/mruby-wasm-runtime
          key: wasi-sdk-33.0-x86_64-linux

      - name: Cache mruby clone
        uses: actions/cache@v5
        with:
          path: mruby-wasm-runtime/mruby
          key: mruby-4.0.0

      - name: Bootstrap wasi-sdk + mruby clone
        working-directory: mruby-wasm-runtime
        run: make wasi-sdk && make js

      - name: Build lilac
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make lilac-full lilac-compiled

      - name: Run wasm_spec (Ruby host)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make test

      - name: Run wasm_spec (Node + happy-dom)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make test-node

      - name: Run cli minitest
        working-directory: lilac/cli
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: bundle exec rake test
