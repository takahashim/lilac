name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lilac
        uses: actions/checkout@v6
        with:
          path: lilac

      - name: Checkout mruby-wasm-runtime
        uses: actions/checkout@v6
        with:
          repository: takahashim/mruby-wasm-runtime
          ref: v0.2.0
          path: mruby-wasm-runtime

      - name: Checkout wasmtime-rb
        uses: actions/checkout@v6
        with:
          repository: bytecodealliance/wasmtime-rb
          ref: main
          path: wasmtime-rb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Restore wasmtime-rb build cache
        id: cache-wasmtime-rb
        uses: actions/cache/restore@v5
        with:
          path: |
            wasmtime-rb/lib
            wasmtime-rb/target
            wasmtime-rb/tmp
          key: wasmtime-rb-${{ runner.os }}-ruby-3.4-${{ hashFiles('wasmtime-rb/Gemfile.lock', 'wasmtime-rb/Cargo.lock') }}

      - name: Build wasmtime-rb
        if: steps.cache-wasmtime-rb.outputs.cache-hit != 'true'
        working-directory: wasmtime-rb
        run: bundle install && bundle exec rake compile

      - name: Save wasmtime-rb build cache
        if: steps.cache-wasmtime-rb.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            wasmtime-rb/lib
            wasmtime-rb/target
            wasmtime-rb/tmp
          key: wasmtime-rb-${{ runner.os }}-ruby-3.4-${{ hashFiles('wasmtime-rb/Gemfile.lock', 'wasmtime-rb/Cargo.lock') }}

      - name: Install wasmtime-rb dependencies
        if: steps.cache-wasmtime-rb.outputs.cache-hit == 'true'
        working-directory: wasmtime-rb
        run: bundle install

      - name: Set up lilac dependencies
        working-directory: lilac/cli
        run: bundle install

      - name: Cache wasi-sdk tarball
        uses: actions/cache@v5
        with:
          path: ~/.cache/mruby-wasm-runtime
          key: wasi-sdk-33.0-x86_64-linux

      - name: Cache mruby clone (source only, without build)
        uses: actions/cache@v5
        with:
          path: |
            mruby-wasm-runtime/mruby
            !mruby-wasm-runtime/mruby/build
          key: mruby-4.0.0-src

      - name: Bootstrap wasi-sdk + mruby clone
        working-directory: mruby-wasm-runtime
        run: make wasi-sdk && make js

      - name: Build lilac
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make lilac-full lilac-compiled mrbc-host

      # LILAC_JS_ENGINE=quickjs makes a missing/broken dommy-js-quickjs a hard
      # failure instead of silently falling back to the lower-fidelity stub —
      # CI must prove the real-JS path actually runs.
      - name: Run wasm_spec (Ruby host, real JS via quickjs)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
          LILAC_JS_ENGINE: quickjs
        run: make test

      # ADR-0033 Phase 2 Ruby ports of the bundle (:bundle boot) and parity
      # (:full×:compiled DOM) integration specs, driven on quickjs + Dommy.
      - name: Run bundle/parity runtime specs (Ruby host)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
          MRUBY_WASM_JS_PATH: ${{ github.workspace }}/mruby-wasm-runtime/mrbgem/mruby-wasm-js/js
          LILAC_JS_ENGINE: quickjs
        run: make test-bundle-rb test-parity-rb

      - name: Run wasm_spec (Node + happy-dom)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
          MRUBY_WASM_JS_PATH: ${{ github.workspace }}/mruby-wasm-runtime/mrbgem/mruby-wasm-js/js
        run: make test-node

      - name: Run cli minitest
        working-directory: lilac/cli
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
          MRUBY_WASM_JS_PATH: ${{ github.workspace }}/mruby-wasm-runtime/mrbgem/mruby-wasm-js/js
        run: bundle exec rake test

      # Pre-release smoke: build the -Oz release wasm and stage the gh-pages
      # CDN tree, so release-only breakage (release.yml runs only on a v* tag)
      # is caught on every push instead of at tag time.
      - name: Build release artifact + stage gh-pages tree (smoke)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: |
          make lilac-full-release
          make pages-pack VERSION=v0.0.0-ci

      # Catch gemspec / packaging errors before a rubygems publish.
      - name: Build gems (smoke)
        working-directory: lilac
        run: |
          (cd cli && gem build lilac-cli.gemspec)
          (cd wasm-bin && gem build lilac-wasm-bin.gemspec)
