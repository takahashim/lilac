name: Test (Node + happy-dom)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-node-spec:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout lilac
        uses: actions/checkout@v4
        with:
          path: lilac

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lilac-build

      - name: Download mruby-wasm-runtime
        uses: actions/download-artifact@v4
        with:
          name: mruby-wasm-runtime
          path: mruby-wasm-runtime

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run wasm_spec (Node + happy-dom)
        working-directory: lilac
        env:
          MRUBY_WASM_RUNTIME_PATH: ${{ github.workspace }}/mruby-wasm-runtime
        run: make test-node
